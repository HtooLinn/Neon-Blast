<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NEON BLAST — Select Mode</title>
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/mode.css">
</head>
<body>

  <div class="stars" id="stars"></div>

  <div class="page-wrapper">
    <button class="btn btn-dim btn-sm back-btn" onclick="navigate('../index.html')">← BACK</button>

    <div class="page-title">SELECT MODE</div>

    <div class="mode-cards">
      <div class="mode-card endless" onclick="navigate('game.html?mode=endless')">
        <div class="mode-icon">♾️</div>
        <div class="mode-title" style="color:var(--neon-cyan)">ENDLESS</div>
        <div class="mode-desc">Infinite play.<br>Beat your high score.<br>No limits — only skill.</div>
      </div>
      <div class="mode-card classic" onclick="navigate('levels.html')">
        <div class="mode-icon">💖</div>
        <div class="mode-title" style="color:var(--neon-pink)">CLASSIC</div>
        <div class="mode-desc">10 levels.<br>Collect hearts to win.<br>Limited moves per level.</div>
      </div>
    </div>
  </div>

  <script src="../js/shared.js"></script>
  <script src="../js/mode.js"></script>
</body>
</html>
